name: Release Build

on:
  release:
    types:
      - published

jobs:
  release:
    name: Build and Upload Release Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Run tests
        run: make test

      - name: Build release archives
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: make package-all VERSION="$VERSION"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*.tar.gz

      - name: Generate npm packages
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          npm --prefix npm run prepare-release -- \
            --version "$VERSION" \
            --dist-dir "$GITHUB_WORKSPACE/dist" \
            --out-dir "$GITHUB_WORKSPACE/npm/out"

      - name: Publish npm packages
        env:
          VERSION: ${{ github.event.release.tag_name }}
          NODE_AUTH_TOKEN: ""
        run: |
          unset NODE_AUTH_TOKEN
          npm --prefix npm run publish-release -- \
            --version "$VERSION" \
            --packages-dir "$GITHUB_WORKSPACE/npm/out"
